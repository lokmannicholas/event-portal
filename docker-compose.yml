services:
  postgres:
    image: postgres:16
    container_name: flu-vax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flu_vax
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - flu-vax-postgres:/var/lib/postgresql/data

volumes:
  flu-vax-postgres:

services:
  postgres:
    image: postgres:16
    container_name: event-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: event_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - event-portal-postgres:/var/lib/postgresql/data

volumes:
  event-portal-postgres:
